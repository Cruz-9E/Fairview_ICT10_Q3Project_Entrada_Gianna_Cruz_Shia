<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.8.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.8.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <title>Intramurals Account Creation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');

        body {
            background: linear-gradient(-45deg, #bb2030, #005eac, #00984d, #f3bd19);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            font-family: "Montserrat", sans-serif;
            text-align: center;
            margin: 0;
            padding-top: 80px;
            padding-bottom: 40px;
        }

        .container {
            background-color: white;
            border-radius: 10px;
            max-width: 650px;
            padding: 40px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin: 10px auto 40px auto; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            margin-bottom: 25px; 
        }

        input.form-control {
            text-align: center;
            height: 45px;
            width: 100%; 
            max-width: 500px;
            margin: 0 auto;
        }

        .pass-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 15px auto;
        }

        #togglePass {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            color: #6c757d;
            font-size: 18px;
            z-index: 10;
            padding: 0;
            display: flex;
            align-items: center;
        }

        .btn-signup {
            margin-top: 10px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 500px;
            background: linear-gradient(to right, #bb2030, #005eac, #00984d, #f3bd19);
            border: none;
            color: white;
            font-weight: bold;
            height: 45px;
        }

        nav {
            background: #fff;
            height: 80px;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }

        nav .logo {
            float: left;
            color: #333;
            font-size: 16px;
            padding: 0 13px;
            line-height: 80px;
            text-transform: uppercase;
            text-decoration: none;
        }

        nav ul {
            float: right;
            margin-right: 20px;
        }

        nav ul li {
            display: inline-block;
            line-height: 80px;
            margin: 0 5px;
        }

        nav ul li a {
            color: #333;
            font-size: 16px;
            padding: 7px 13px;
            border-radius: 3px;
            text-transform: uppercase;
            text-decoration: none;
        }

        a.active, nav ul li a:hover {
            background: #eee;
            transition: .5s;
            color: #333;
        }

        #check { display: none; }
        .checkbtn {
            font-size: 30px;
            color: #333;
            float: right;
            line-height: 80px;
            margin-right: 40px;
            cursor: pointer;
            display: none;
            z-index: 101;
        }

        @media (max-width: 900px) {
            .checkbtn { display: block; }
            nav ul {
                position: fixed;
                width: 100%;
                height: 100vh;
                background: #fff;
                top: 80px;
                left: -100%;
                text-align: center;
                transition: all .5s;
            }
            nav ul li { display: block; margin: 50px 0; }
            #check:checked~ul { left: 0; }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>

<body>
    <nav>
        <input type="checkbox" id="check">
        <label for="check" class="checkbtn">
            <i class="fas fa-bars"></i>
        </label>
        <a href="index.html" class="logo">Intramurals SY 2025-2026</a>
        <ul>
            <li><a class="active" href="index.html">Sign Up</a></li>
            <li><a href="team.html">Team Checker</a></li>
            <li><a href="list.html">Players</a></li>
        </ul>
    </nav>

    <div class="text-center text-white pt-5 pb-2">
        <h1 class="fw-bold display-4">
            <i class="fa-solid fa-trophy me-2"></i>
            Intramurals SY 2526
            <i class="fa-solid fa-trophy me-2"></i>
        </h1>
        <p class="lead">Represent your team with pride!</p>
    </div>

    <div class="container">
        <h1>Create Account</h1>
        <form style="width: 100%; display: contents;">
            <div class="d-flex flex-column align-items-center w-100">
                <input type="text" class="form-control mb-3" id="user" placeholder="Username" />
                <div class="pass-wrapper">
                    <input type="password" class="form-control" id="pass" placeholder="Password" />
                    <button type="button" id="togglePass" py-click="toggle_pass">
                        <i id="eyeIcon" class="fa-solid fa-eye"></i>
                    </button>
                </div>
                <button type="button" class="btn btn-primary btn-signup" py-click="create_account">Sign Up</button>
            </div>
        </form>
        <div id="output"></div>
    </div>

    <footer class="text-center mt-5 text-white">
        © Intramurals SY 2025-2026 | Made with ❤️
    </footer>
    <py-script src="main.py"></py-script>
</body>

</html>
