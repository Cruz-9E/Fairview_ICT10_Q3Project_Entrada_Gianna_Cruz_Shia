<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.8.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.8.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <title>Intramurals Team Checker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');

        body {
            background: linear-gradient(-45deg, #bb2030, #005eac, #00984d, #f3bd19);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            font-family: "Montserrat", sans-serif;
            text-align: center;
            margin: 0;
            padding-top: 80px;
            padding-bottom: 40px;
        }

        .container {
            max-width: 650px;
            background-color: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
            margin-bottom: 40px;
            margin-left: auto;
            margin-right: auto;
        }

        h1 {
            margin-bottom: 30px;
            color: #333;
        }

        .form-section {
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .form-section:last-of-type {
            border-bottom: none;
        }

        .form-section p {
            font-size: 16px;
            margin-bottom: 15px;
            color: #333;
            font-weight: 600;
        }

        .radio-group {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 10px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="radio"] {
            margin: 0;
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .select-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        select {
            text-align: center;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: "Montserrat", sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:hover {
            border-color: #005eac;
        }

        .btn-signup {
            margin-top: 10px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 500px;
            background: linear-gradient(to right, #bb2030, #005eac, #00984d, #f3bd19);
            border: none;
            color: white;
            font-weight: bold;
            height: 45px;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-signup:hover {
            transform: scale(1.02);
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
        }

        .team-logo {
            width: 100%;
            max-width: 400px;
            height: 250px;
            object-fit: cover;
            object-position: center;
            margin-top: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            border-radius: 0;
            box-shadow: none;
            background: transparent;
        }

        nav {
            background: #fff;
            height: 80px;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }

        nav .logo {
            float: left;
            color: #333;
            font-size: 16px;
            padding-left: 13px;
            padding-right: 13px;
            line-height: 80px;
            text-transform: uppercase;
            text-decoration: none;
        }

        nav ul {
            float: right;
            margin-right: 20px;
        }

        nav ul li {
            display: inline-block;
            line-height: 80px;
            margin-left: 5px;
            margin-right: 5px;
        }

        nav ul li a {
            color: #333;
            font-size: 16px;
            padding-top: 7px;
            padding-bottom: 7px;
            padding-left: 13px;
            padding-right: 13px;
            border-radius: 3px;
            text-transform: uppercase;
            text-decoration: none;
        }

        a.active,
        nav ul li a:hover {
            background: #eee;
            transition: .5s;
            color: #333;
        }

        #check {
            display: none;
        }

        .checkbtn {
            font-size: 30px;
            color: #333;
            float: right;
            line-height: 80px;
            margin-right: 40px;
            cursor: pointer;
            display: none;
            z-index: 101;
        }

        @media (max-width: 900px) {
            .checkbtn {
                display: block;
            }

            nav ul {
                position: fixed;
                width: 100%;
                height: 100vh;
                background: #fff;
                top: 80px;
                left: -100%;
                text-align: center;
                transition: all .5s;
                z-index: 101;
            }

            nav ul li {
                display: block;
                margin-top: 50px;
                margin-bottom: 50px;
            }

            #check:checked~ul {
                left: 0;
            }

            .container {
                padding: 20px;
                max-width: calc(100% - 40px);
            }

            .radio-group,
            .select-group {
                flex-direction: column;
                gap: 15px;
            }

            select {
                width: 100%;
            }

            .team-logo {
                max-width: 100%;
                height: 200px;
            }
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }
    </style>
</head>

<body>
    <nav>
        <input type="checkbox" id="check">
        <label for="check" class="checkbtn">
            <i class="fas fa-bars"></i>
        </label>
        <a href="index.html" class="logo">Intramurals SY 2025-2026</a>
        <ul>
            <li><a href="index.html">Sign Up</a></li>
            <li><a class="active" href="team.html">Team Checker</a></li>
            <li><a href="list.html">Players</a></li>
        </ul>
    </nav>
    <div class="container">
        <h1>Intramurals Team Checker</h1>
        <form>
            <div class="form-section">
                <p>Are you done with the online registration?</p>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="reg1" name="registration" value="yes">
                        <label for="reg1">Yes</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="reg2" name="registration" value="no">
                        <label for="reg2">No</label>
                    </div>
                </div>
            </div>
            <div class="form-section">
                <p>Do you have medical clearance from the clinic?</p>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="clear1" name="clearance" value="yes">
                        <label for="clear1">Yes</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="clear2" name="clearance" value="no">
                        <label for="clear2">No</label>
                    </div>
                </div>
            </div>
            <div class="form-section">
                <p>What is your Grade & Section?</p>
                <div class="select-group">
                    <select id="grade" name="grade">
                        <option value="">Grade</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                    </select>
                    <select id="section" name="section">
                        <option value="">Section</option>
                        <option value="emerald">Emerald</option>
                        <option value="ruby">Ruby</option>
                        <option value="sapphire">Sapphire</option>
                        <option value="topaz">Topaz</option>
                        <option value="jade">Jade</option>
                    </select>
                </div>
            </div>
        </form>
        <button type="button" class="btn btn-primary btn-signup" py-click="sign_up">Check Team</button>
        <div id="output"></div>
    </div>
    <footer class="text-center mt-5 text-white">© Intramurals SY 2025-2026 | Made with ❤️</footer>
    <py-script src="team.py"></py-script>
</body>

</html>
